name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
      - name: Build macOS menu-bar app
        if: runner.os == 'macOS'
        run: |
          ./macos/build.sh
          codesign --verify --deep --strict dist-macos/CodingMacro.app
          plutil -lint dist-macos/CodingMacro.app/Contents/Info.plist
